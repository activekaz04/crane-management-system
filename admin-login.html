<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者ログイン | サンワクレーン</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="login-page">
    <div class="login-card">

      <!-- ロゴ -->
      <div class="login-logo-wrap">
        <img class="login-logo"
             src="http://sanwacrane.jp/images/logo3.png"
             alt="サンワクレーン株式会社"
             onerror="this.style.display='none'">
      </div>

      <div class="login-title">管理者ログイン</div>
      <div class="login-subtitle">サンワクレーン クレーン管理システム</div>

      <!-- ログインフォーム -->
      <form id="loginForm">
        <div class="form-group" style="text-align:left">
          <label class="form-label" for="passwordInput">
            <i class="fas fa-lock"></i> パスワード
          </label>
          <input type="password"
                 id="passwordInput"
                 class="form-control"
                 placeholder="パスワードを入力"
                 autocomplete="current-password"
                 required>
        </div>

        <!-- エラーメッセージ -->
        <div id="errorMsg" class="alert alert-danger hidden" style="margin-bottom:var(--sp-md)">
          <i class="fas fa-exclamation-triangle"></i>
          パスワードが正しくありません
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">
          <i class="fas fa-sign-in-alt"></i> ログイン
        </button>
      </form>

      <div style="margin-top:var(--sp-xl);font-size:var(--font-size-sm);color:var(--color-text-muted)">
        <i class="fas fa-info-circle"></i>
        現場作業員の方はQRコードからアクセスしてください
      </div>

    </div>
  </div>

  <!-- スクリプト読み込み -->
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    /* すでにログイン済みならダッシュボードへ */
    if (Auth.isLoggedIn()) {
      window.location.href = 'admin-dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const pw = document.getElementById('passwordInput').value;
      if (await Auth.login(pw)) {
        window.location.href = 'admin-dashboard.html';
      } else {
        document.getElementById('errorMsg').classList.remove('hidden');
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
      }
    });
  </script>

</body>
</html>
