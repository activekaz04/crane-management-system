<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>修理記録入力 | サンワクレーン</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ヘッダー -->
  <header class="header">
    <a class="header-brand" href="#">
      <img class="header-logo"
           src="http://sanwacrane.jp/images/logo4.png"
           alt="サンワクレーン"
           onerror="this.style.display='none'">
      <div class="header-brand-text">
        <div class="header-title">修理記録入力</div>
        <div class="header-subtitle" id="vehicleNumberDisplay">—</div>
      </div>
    </a>
    <nav class="header-nav">
      <a id="btnBack" href="crane.html">
        <i class="fas fa-arrow-left"></i> 戻る
      </a>
    </nav>
  </header>

  <!-- メインコンテンツ -->
  <main class="container-sm" style="padding-top:var(--sp-xl)">

    <div id="formWrapper">

      <!-- 対象クレーン表示 -->
      <div class="crane-info-card" style="margin-bottom:var(--sp-lg)">
        <div style="font-size:var(--font-size-sm);color:rgba(255,255,255,0.7);margin-bottom:4px">対象クレーン</div>
        <div class="crane-vehicle-number" id="vehicleNumberDisplay2">—</div>
        <div style="color:rgba(255,255,255,0.85)" id="craneNameDisplay">—</div>
      </div>

      <!-- フォーム -->
      <form id="repairForm">
        <div class="form-section">
          <div class="form-section-title"><i class="fas fa-tools"></i>修理記録</div>

          <div class="form-group">
            <label class="form-label">修理日 <span class="required">*</span></label>
            <input type="date" class="form-control" id="rDate">
          </div>

          <div class="form-group">
            <label class="form-label">担当者</label>
            <input type="text" class="form-control" id="rOperator" placeholder="担当者名">
          </div>

          <div class="form-group">
            <label class="form-label">故障箇所 <span class="required">*</span></label>
            <input type="text" class="form-control" id="rFaultLocation" placeholder="例：エンジン冷却系">
          </div>

          <div class="form-group">
            <label class="form-label">交換部品</label>
            <input type="text" class="form-control" id="rReplacedParts" placeholder="例：ウォーターポンプ、Oリング">
          </div>

          <div class="form-group">
            <label class="form-label">対策</label>
            <textarea class="form-control" id="rCountermeasure" rows="4" placeholder="実施した対策内容を記入"></textarea>
          </div>

          <div class="form-group mb-0">
            <label class="form-label">備考</label>
            <textarea class="form-control" id="rNotes" rows="3" placeholder="特記事項があれば記入"></textarea>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:var(--sp-md);margin-top:var(--sp-xl);padding-bottom:calc(var(--sp-xl) + env(safe-area-inset-bottom))">
          <button type="submit" class="btn btn-accent btn-lg btn-block">
            <i class="fas fa-save"></i> 保存する
          </button>
          <a id="btnBackBottom" href="crane.html" class="btn btn-outline btn-lg btn-block">
            <i class="fas fa-times"></i> キャンセル
          </a>
        </div>
      </form>

    </div>

  </main>

  <!-- スクリプト読み込み -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/repair.js"></script>

</body>
</html>
