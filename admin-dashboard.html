<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード | サンワクレーン管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ヘッダー -->
  <header class="header">
    <a class="header-brand" href="admin-dashboard.html">
      <img class="header-logo"
           src="http://sanwacrane.jp/images/logo4.png"
           alt="サンワクレーン"
           onerror="this.style.display='none'">
      <div class="header-brand-text">
        <div class="header-title">SANWA CRANE</div>
        <div class="header-subtitle">管理者ダッシュボード</div>
      </div>
    </a>
    <nav class="header-nav">
      <button onclick="Auth.logout()">
        <i class="fas fa-sign-out-alt"></i> ログアウト
      </button>
    </nav>
  </header>

  <!-- 管理者ナビ -->
  <nav class="admin-nav">
    <a href="admin-dashboard.html" class="active"><i class="fas fa-tachometer-alt"></i> ダッシュボード</a>
    <a href="admin-cranes.html"><i class="fas fa-truck-moving"></i> クレーン管理</a>
    <a href="qr-generator.html"><i class="fas fa-qrcode"></i> QRコード生成</a>
  </nav>

  <!-- メインコンテンツ -->
  <main class="container" style="padding-top:var(--sp-xl)">

    <h1 class="page-title">
      <i class="fas fa-tachometer-alt"></i> ダッシュボード
    </h1>

    <!-- 統計カード -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-truck-moving"></i></div>
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-label">登録クレーン数</div>
      </div>
      <div class="stat-card stat-info">
        <div class="stat-icon"><i class="fas fa-clipboard-list"></i></div>
        <div class="stat-value" id="statRecords">—</div>
        <div class="stat-label">メンテナンス記録数</div>
      </div>
      <div class="stat-card stat-warning">
        <div class="stat-icon"><i class="fas fa-exclamation-triangle"></i></div>
        <div class="stat-value" id="statAlert">—</div>
        <div class="stat-label">30日以内に期限</div>
      </div>
      <div class="stat-card stat-danger">
        <div class="stat-icon"><i class="fas fa-times-circle"></i></div>
        <div class="stat-value" id="statExpired">—</div>
        <div class="stat-label">期限超過</div>
      </div>
      <div class="stat-card stat-repair">
        <div class="stat-icon"><i class="fas fa-tools"></i></div>
        <div class="stat-value" id="statRepairs">—</div>
        <div class="stat-label">修理件数</div>
      </div>
    </div>

    <!-- クレーン一覧 -->
    <div class="card">
      <div class="card-header">
        <i class="fas fa-list"></i> クレーン一覧
        <a href="admin-cranes.html" class="btn btn-sm btn-accent no-print"
           style="margin-left:auto">
          <i class="fas fa-plus"></i> クレーン管理
        </a>
      </div>
      <div class="table-wrapper">
        <table class="table">
          <thead>
            <tr>
              <th>クレーンID</th>
              <th>車番</th>
              <th>型式</th>
              <th>設置場所</th>
              <th>最終メンテナンス</th>
              <th>状態</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="craneTableBody">
            <tr><td colspan="7" class="text-center">読み込み中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <!-- スクリプト読み込み -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin-dashboard.js"></script>

</body>
</html>
