<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>点検入力 | サンワクレーン</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ヘッダー -->
  <header class="header">
    <a class="header-brand" href="#">
      <img class="header-logo"
           src="http://sanwacrane.jp/images/logo4.png"
           alt="サンワクレーン"
           onerror="this.style.display='none'">
      <div class="header-brand-text">
        <div class="header-title">点検入力</div>
        <div class="header-subtitle" id="vehicleNumberDisplay">—</div>
      </div>
    </a>
    <nav class="header-nav">
      <a id="btnBack" href="crane.html"><i class="fas fa-arrow-left"></i> 戻る</a>
    </nav>
  </header>

  <!-- メインコンテンツ -->
  <main class="container-sm" style="padding-top:var(--sp-xl)">
    <div id="formWrapper">

      <!-- 対象クレーン表示 -->
      <div class="crane-info-card" style="margin-bottom:var(--sp-lg)">
        <div style="font-size:var(--font-size-sm);color:rgba(255,255,255,0.7);margin-bottom:4px">対象クレーン</div>
        <div class="crane-vehicle-number" id="vehicleNumberDisplay2">—</div>
        <div style="color:rgba(255,255,255,0.85)" id="craneNameDisplay">—</div>
      </div>

      <!-- フォーム -->
      <form id="inspectionForm">
        <div class="form-section">
          <div class="form-section-title"><i class="fas fa-search"></i>点検記録</div>

          <div class="form-group">
            <label class="form-label">点検日 <span class="required">*</span></label>
            <input type="date" class="form-control" id="iDate" required>
          </div>

          <div class="form-group">
            <label class="form-label">担当者 <span class="required">*</span></label>
            <input type="text" class="form-control" id="iOperator" placeholder="担当者名" required>
          </div>

          <div class="form-group">
            <label class="form-label">部位 <span class="required">*</span></label>
            <select class="form-control" id="iSection" required>
              <option value="">— 選択してください —</option>
              <option value="carrier">キャリア</option>
              <option value="upper">アッパー</option>
            </select>
          </div>

          <div class="grid grid-2" style="gap:var(--sp-md)">
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">オドメーター</label>
              <input type="number" class="form-control" id="iOdometer" placeholder="例：12500" min="0">
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">アワメーター</label>
              <input type="number" class="form-control" id="iHourMeter" placeholder="例：3200" min="0">
            </div>
          </div>

          <div class="form-group" style="margin-top:var(--sp-md)">
            <label class="form-label">
              点検項目
              <span style="font-weight:400;font-size:var(--font-size-sm);color:var(--color-text-muted);margin-left:6px">タップして選択・入力</span>
            </label>

            <!-- エンジンオイル -->
            <div class="insp-item-card" id="card-engineOil">
              <div class="insp-item-toggle" onclick="toggleItem('engineOil')">
                <i class="fas fa-oil-can item-icon"></i>
                <span class="item-label">エンジンオイル</span>
                <i class="fas fa-chevron-down insp-item-arrow"></i>
              </div>
              <div class="insp-item-detail hidden" id="detail-engineOil">
                <div class="form-group">
                  <label class="form-label">ゲージ</label>
                  <select class="form-control" id="item-engineOil-level">
                    <option value="">— 選択 —</option>
                    <option value="appropriate">適量</option>
                    <option value="refilled">補充済</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">備考</label>
                  <input type="text" class="form-control" id="item-engineOil-notes" placeholder="補充時は補充量を記載">
                </div>
              </div>
            </div>

            <!-- クーラント -->
            <div class="insp-item-card" id="card-coolant">
              <div class="insp-item-toggle" onclick="toggleItem('coolant')">
                <i class="fas fa-temperature-half item-icon"></i>
                <span class="item-label">クーラント</span>
                <i class="fas fa-chevron-down insp-item-arrow"></i>
              </div>
              <div class="insp-item-detail hidden" id="detail-coolant">
                <div class="form-group">
                  <label class="form-label">ゲージ</label>
                  <select class="form-control" id="item-coolant-level">
                    <option value="">— 選択 —</option>
                    <option value="appropriate">適量</option>
                    <option value="refilled">補充済</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">備考</label>
                  <input type="text" class="form-control" id="item-coolant-notes" placeholder="補充時は補充量を記載">
                </div>
              </div>
            </div>

            <!-- タイヤ空気圧 -->
            <div class="insp-item-card" id="card-tirePressure">
              <div class="insp-item-toggle" onclick="toggleItem('tirePressure')">
                <i class="fas fa-circle-dot item-icon"></i>
                <span class="item-label">タイヤ空気圧</span>
                <i class="fas fa-chevron-down insp-item-arrow"></i>
              </div>
              <div class="insp-item-detail hidden" id="detail-tirePressure">
                <div class="grid grid-2" style="gap:var(--sp-sm)">
                  <div>
                    <label class="form-label" style="font-size:var(--font-size-sm)">左前 FL (kPa)</label>
                    <input type="number" class="form-control" id="item-tire-fl" placeholder="700" min="0" max="1200">
                  </div>
                  <div>
                    <label class="form-label" style="font-size:var(--font-size-sm)">右前 FR (kPa)</label>
                    <input type="number" class="form-control" id="item-tire-fr" placeholder="700" min="0" max="1200">
                  </div>
                  <div>
                    <label class="form-label" style="font-size:var(--font-size-sm)">左後 RL (kPa)</label>
                    <input type="number" class="form-control" id="item-tire-rl" placeholder="700" min="0" max="1200">
                  </div>
                  <div>
                    <label class="form-label" style="font-size:var(--font-size-sm)">右後 RR (kPa)</label>
                    <input type="number" class="form-control" id="item-tire-rr" placeholder="700" min="0" max="1200">
                  </div>
                </div>
                <div class="form-group" style="margin-top:var(--sp-sm)">
                  <label class="form-label">備考</label>
                  <input type="text" class="form-control" id="item-tirePressure-notes" placeholder="特記事項">
                </div>
              </div>
            </div>

            <!-- 作動油 -->
            <div class="insp-item-card" id="card-hydraulicOil">
              <div class="insp-item-toggle" onclick="toggleItem('hydraulicOil')">
                <i class="fas fa-droplet item-icon"></i>
                <span class="item-label">作動油</span>
                <i class="fas fa-chevron-down insp-item-arrow"></i>
              </div>
              <div class="insp-item-detail hidden" id="detail-hydraulicOil">
                <div class="form-group">
                  <label class="form-label">ゲージ</label>
                  <select class="form-control" id="item-hydraulicOil-level">
                    <option value="">— 選択 —</option>
                    <option value="appropriate">適量</option>
                    <option value="refilled">補充済</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">備考</label>
                  <input type="text" class="form-control" id="item-hydraulicOil-notes" placeholder="補充時は補充量を記載">
                </div>
              </div>
            </div>

            <!-- その他 -->
            <div class="insp-item-card" id="card-other">
              <div class="insp-item-toggle" onclick="toggleItem('other')">
                <i class="fas fa-ellipsis item-icon"></i>
                <span class="item-label">その他</span>
                <i class="fas fa-chevron-down insp-item-arrow"></i>
              </div>
              <div class="insp-item-detail hidden" id="detail-other">
                <div class="form-group">
                  <label class="form-label">内容・備考</label>
                  <textarea class="form-control" id="item-other-notes" rows="3" placeholder="点検内容を記入"></textarea>
                </div>
              </div>
            </div>

          </div><!-- /点検項目 -->

          <div class="form-group mb-0">
            <label class="form-label">全体備考</label>
            <textarea class="form-control" id="iNotes" rows="2" placeholder="全体的な特記事項があれば記入"></textarea>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:var(--sp-md);margin-top:var(--sp-xl)">
          <button type="submit" class="btn btn-accent btn-lg btn-block">
            <i class="fas fa-save"></i> 保存する
          </button>
          <a id="btnBackBottom" href="crane.html" class="btn btn-outline btn-lg btn-block">
            <i class="fas fa-times"></i> キャンセル
          </a>
        </div>
      </form>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/inspection.js"></script>

</body>
</html>
